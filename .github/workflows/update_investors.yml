name: Update Investors Data

on:
  schedule:
    # 毎日日本時間 0:00（UTC 15:00）に実行
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CROSS_REPO_TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN != '' && secrets.CROSS_REPO_READ_TOKEN || github.token }}

    steps:
      - name: Checkout invest_like_legends
        uses: actions/checkout@v4

      - name: Checkout stock_db
        uses: actions/checkout@v4
        with:
          repository: expgolemclone/stock_db
          path: external/stock_db
          token: ${{ env.CROSS_REPO_TOKEN }}

      - name: Checkout formula_screening
        uses: actions/checkout@v4
        with:
          repository: expgolemclone/formula_screening
          path: external/formula_screening
          token: ${{ env.CROSS_REPO_TOKEN }}

      - name: Checkout stock_web_ui
        uses: actions/checkout@v4
        with:
          repository: expgolemclone/stock_web_ui
          path: external/stock_web_ui
          token: ${{ env.CROSS_REPO_TOKEN }}

      - name: Checkout japan_company_handbook DB snapshot
        uses: actions/checkout@v4
        with:
          repository: expgolemclone/japan_company_handbook
          path: external/japan_company_handbook
          token: ${{ env.CROSS_REPO_TOKEN }}
          sparse-checkout: |
            data/stock_performance.db
          sparse-checkout-cone-mode: false

      - name: Link sibling worktrees expected by uv
        run: |
          parent_dir="$(dirname "$GITHUB_WORKSPACE")"
          ln -sfn "$GITHUB_WORKSPACE/external/stock_db" "$parent_dir/stock_db"
          ln -sfn "$GITHUB_WORKSPACE/external/formula_screening" "$parent_dir/formula_screening"
          ln -sfn "$GITHUB_WORKSPACE/external/stock_web_ui" "$parent_dir/stock_web_ui"
          ln -sfn "$GITHUB_WORKSPACE/external/japan_company_handbook" "$parent_dir/japan_company_handbook"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Download stocks.db artifact
        env:
          GH_TOKEN: ${{ env.CROSS_REPO_TOKEN }}
        run: |
          tmpdir="$(mktemp -d)"
          mkdir -p external/stock_db/var/db
          gh run download -R expgolemclone/stock_db -n stocks-db -D "$tmpdir"
          artifact_path="$(find "$tmpdir" -name 'stocks.db' -print -quit)"
          test -n "$artifact_path"
          mv "$artifact_path" external/stock_db/var/db/stocks.db
          ls -lh external/stock_db/var/db/stocks.db

      - name: Install dependencies
        run: uv sync --frozen --no-dev

      - name: Generate investors data
        env:
          STOCK_DB_VAR_DIR: ${{ github.workspace }}/external/stock_db/var
          HANDBOOK_DB_PATH: ${{ github.workspace }}/external/japan_company_handbook/data/stock_performance.db
        run: uv run python scripts/enrich_investors.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/assets/data/investors.json
          git diff --staged --quiet || git commit -m "大株主DBから投資家データを再生成"
          git push
