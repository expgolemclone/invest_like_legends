<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>保有銘柄ビューア - 四季報オンラインリンク一覧</title>
    <link rel="stylesheet" href="assets/style.css" />
    <script src="assets/stock-table.js?v=58ba05a" defer></script>
  </head>
  <body>
    <div class="container">
      <header class="page-header">
        <h1 id="pageTitle">保有銘柄一覧</h1>
      </header>

      <nav class="tab-bar" aria-label="投資家切替">
        <button
          class="tab active"
          type="button"
          data-investor-key="naito"
          aria-selected="true"
        >
          内藤征吾
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="hikari"
          aria-selected="false"
        >
          光通信
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="kiyohara"
          aria-selected="false"
        >
          清原達郎
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="katayama"
          aria-selected="false"
        >
          片山晃
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="imura"
          aria-selected="false"
        >
          井村俊哉
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="gomi"
          aria-selected="false"
        >
          五味大輔
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="one_warikabunihon"
          aria-selected="false"
        >
          one割安株日本株
        </button>
      </nav>

      <div class="stats" aria-label="統計">
        <div class="stat-card">
          <div class="label">保有銘柄数</div>
          <div class="value" id="statCount">-</div>
        </div>
        <div class="stat-card">
          <div class="label">最大保有額</div>
          <div class="value" id="statMaxAmount">-</div>
        </div>
      </div>

      <div class="toolbar">
        <div class="search-box">
          <label class="sr-only" for="search">銘柄コード or 会社名で検索</label>
          <input
            type="text"
            id="search"
            placeholder="銘柄コード or 会社名で検索..."
            autocomplete="off"
          />
        </div>
        <p id="statusMessage" class="status-message" aria-live="polite">
          投資家データを読み込み中です。
        </p>
      </div>

      <div class="table-wrap">
        <table id="stockTable">
          <thead>
            <tr>
              <th scope="col" title="銘柄コード（証券コード）">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="code"
                >
                  code <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="会社名">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="name"
                >
                  name <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="投資家の保有額（億円）">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="amount_millions"
                >
                  amount <span class="arrow" aria-hidden="true">▼</span>
                </button>
              </th>
              <th scope="col" title="投資家の保有割合（%）">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="ratio_percent"
                >
                  ratio <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="ネットキャッシュレシオ — 現金同等物から有利子負債を引いた額を時価総額で割った値。高いほど財務が安全">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="net_cash_ratio"
                >
                  ncr <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="株価収益率 — 株価を1株当たり利益で割った値。低いほど割安（目安: 15倍以下）">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="per"
                >
                  per <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="自己資本比率 — 総資産に占める自己資本の割合。高いほど経営が安定">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="equity_ratio"
                >
                  equity <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="フリーキャッシュフローイールド — FCFを時価総額で割った値。高いほどキャッシュ創出力が優れている">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="fcf_yield_avg"
                >
                  fcf_y <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="投下資本キャッシュリターン — FCFを投下資本で割った値。高いほど資本効率が良い">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="croic"
                >
                  croic <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col">url</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td class="table-message" colspan="10">
                投資家データを読み込み中です。
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="footer">※ 保有額順（降順）で表示</div>
    </div>
  </body>
</html>
