<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保有銘柄ビューア - 四季報オンラインリンク一覧</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="assets/stock-table.js?v=58ba05a" defer></script>
  </head>
  <body>
    <div class="container">
      <nav class="tab-bar" aria-label="投資家切替">
        <button
          class="tab active"
          type="button"
          data-investor-key="naito"
          aria-selected="true"
        >
          内藤征吾
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="hikari"
          aria-selected="false"
        >
          光通信
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="kiyohara"
          aria-selected="false"
        >
          清原達郎
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="katayama"
          aria-selected="false"
        >
          片山晃
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="imura"
          aria-selected="false"
        >
          井村俊哉
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="gomi"
          aria-selected="false"
        >
          五味大輔
        </button>
        <button
          class="tab"
          type="button"
          data-investor-key="one_warikabunihon"
          aria-selected="false"
        >
          one割安株日本株
        </button>
      </nav>

      <div class="toolbar">
        <p id="statusMessage" class="status-message" aria-live="polite">
          投資家データを読み込み中です。
        </p>
      </div>

      <div class="table-wrap">
        <table id="stockTable">
          <thead>
            <tr>
              <th scope="col" title="銘柄コード（証券コード）">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="code"
                >
                  code <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="会社名">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="name"
                >
                  name <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="投資家の保有金額">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="amount_millions"
                >
                  amount <span class="arrow" aria-hidden="true">▼</span>
                </button>
              </th>
              <th scope="col" title="投資家の保有株数 / 発行済株式総数 * 100">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="ratio_percent"
                >
                  ratio <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th
                scope="col"
                title="(流動資産 - 棚卸資産 + 有価証券 * 0.7) / 時価総額"
              >
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="net_cash_ratio"
                >
                  ncr <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="株価 / 来期予想EPS">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="per"
                >
                  per <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="自己資本 / 総資産 * 100">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="equity_ratio"
                >
                  equity <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="10期の平均FCF / 時価総額">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="fcf_yield_avg"
                >
                  fcf_y <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col" title="FCF / (自己資本 + 有利子負債)">
                <button
                  class="sort-button"
                  type="button"
                  data-sort-column="croic"
                >
                  croic <span class="arrow" aria-hidden="true">▽</span>
                </button>
              </th>
              <th scope="col">url</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td class="table-message" colspan="10">
                投資家データを読み込み中です。
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </body>
</html>
